# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 90%  # New code must be well-tested

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "tests/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.d.ts"
  - "scripts/**"
  - "*.config.*"
