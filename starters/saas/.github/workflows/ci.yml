name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Gate 1: Type check + Lint
      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      # Gate 2: Unit + Integration tests with coverage
      - name: Tests
        run: pnpm test:coverage

      # Gate 2b: Upload coverage to Codecov
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Gate 2c: Quality scan (jscpd + knip)
      - name: Quality scan
        run: pnpm quality:scan

      # Gate 2d: Architecture fitness
      - name: Architecture tests
        run: pnpm test:arch

      # Gate 2e: Test traceability
      - name: Test traceability
        run: pnpm test:traceability || true  # Non-blocking initially

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'  # Only on merge, not on PR
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for incremental mode

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Mutation testing (incremental)
        run: pnpm test:mutation
        continue-on-error: true  # Non-blocking phase 1

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 7
