name: E2E Staging

on:
  push:
    branches: [staging]

concurrency:
  group: e2e-staging
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  get-deploy-url:
    name: Get Staging Deploy URL
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Wait for Vercel staging deployment
        id: deploy
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 30;
            const delayMs = 20000;
            for (let i = 0; i < maxAttempts; i++) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                per_page: 5,
              });
              for (const deploy of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deploy.id,
                  per_page: 1,
                });
                const status = statuses[0];
                if (status && status.state === 'success' && status.environment_url) {
                  core.setOutput('url', status.environment_url);
                  return;
                }
              }
              await new Promise(r => setTimeout(r, delayMs));
            }
            core.setFailed('Vercel staging deployment not found after 10 minutes');

  post-deploy-smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [get-deploy-url]
    timeout-minutes: 3
    steps:
      - name: Health check
        run: |
          URL="${DEPLOY_URL}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
        env:
          DEPLOY_URL: ${{ needs.get-deploy-url.outputs.url }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [get-deploy-url, post-deploy-smoke]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E against staging
        run: pnpm test:e2e
        env:
          CI: true
          BASE_URL: "${{ needs.get-deploy-url.outputs.url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_SECRET }}"
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: playwright-report/, retention-days: 7 }

  auto-merge-main:
    name: Auto-merge to main
    runs-on: ubuntu-latest
    needs: [e2e]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: staging
      - name: Create and auto-merge PR staging→main
        run: |
          EXISTING=$(gh pr list --base main --head staging --json number -q '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            gh pr merge "$EXISTING" --auto --merge --delete-branch=false
          else
            PR_URL=$(gh pr create \
              --base main \
              --head staging \
              --title "ci: auto-merge staging into main (E2E passed)" \
              --body "Automated merge after E2E staging tests passed.

          Triggered by commit: ${COMMIT_SHA}

          Generated by CI pipeline")
            echo "Created PR: $PR_URL"
            PR_NUM=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+')
            gh pr merge "$PR_NUM" --auto --merge --delete-branch=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
