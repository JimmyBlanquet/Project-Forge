name: Security

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  dependency-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Security report
        if: failure()
        run: |
          echo "⚠️  Vulnerabilities found!"
          echo "Run locally: pnpm audit"
          echo "Fix: pnpm audit --fix"

  env-validation:
    name: Environment Variables Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env files not committed
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.local$|^\.env\.test$'; then
            echo "❌ ERROR: .env file committed!"
            exit 1
          fi
          echo "✅ No .env files in git"

      - name: Verify .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "❌ ERROR: .env.example missing"
            exit 1
          fi
          echo "✅ .env.example exists"

      - name: Check for NEXT_PUBLIC_ secrets
        run: |
          if grep -r "NEXT_PUBLIC_.*SECRET\|NEXT_PUBLIC_.*PRIVATE\|NEXT_PUBLIC_.*SERVICE_ROLE" src/; then
            echo "❌ ERROR: Secret in NEXT_PUBLIC_ variable!"
            echo "NEXT_PUBLIC_* variables are exposed to browser!"
            exit 1
          fi
          echo "✅ No NEXT_PUBLIC_ secrets found"

  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  security-check-script:
    name: Run Security Check Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security-check.sh
        run: ./scripts/security-check.sh
