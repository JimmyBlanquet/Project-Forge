name: Security check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-sensitive-refs:
    name: Scan for sensitive references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run check-no-internal-refs.sh
        run: bash scripts/check-no-internal-refs.sh

      - name: Hint on failure
        if: failure()
        run: |
          echo "::error::Sensitive reference detected. Replace with env var or add to .security-allowlist"
          echo "Run locally to debug: bash scripts/check-no-internal-refs.sh --verbose"
