name: Update README assets

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Regenerate demo GIF
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render demo GIF via VHS
        uses: charmbracelet/vhs-action@v2
        with:
          path: assets/demo.tape

      - name: Open PR with updated assets
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(assets): regenerate demo GIF"
          title: "chore(assets): regenerate README demo GIF"
          body: |
            Auto-generated by `update-assets` workflow.
            Triggered by: ${{ github.event_name }}

            Regenerated:
            - `assets/demo.gif` from `assets/demo.tape`
          branch: chore/auto-assets-update
          delete-branch: true
