name: Feature request
description: Suggest a new feature, skill, or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an idea! Project-Forge is opinionated, so we're cautious about adding scope. Help us evaluate by filling the sections below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. The "why" matters more than the "what".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would this look from a user's perspective? Include CLI commands, file changes, or skill triggers if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider? Why didn't those work?

  - type: dropdown
    id: scope
    attributes:
      label: Where does this fit?
      options:
        - New skill (skills/)
        - New extension (extensions/)
        - tools/bootstrap option
        - Starter improvement (which starter?)
        - Ralph++ enhancement
        - SDLC pipeline (spec-kit integration)
        - Documentation
        - Other (explain in proposal)
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd be willing to open a PR for this
        - label: I'd be willing to help test
